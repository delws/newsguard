# NEWSGUARD — конфігурація
# Усі RSS-фіди нижче перевірені реальними запитами 2026-07-14: фід відповідає
# валідним XML, а його <title> збігається з виданням. Де RSS не знайдено —
# fallback на t.me/s/ з хендлом, підтвердженим НА САЙТІ видання (не вгаданим).

embedding:
  # MIT-ліцензія; укр+рос; dim=1024; працює локально на CPU
  model: intfloat/multilingual-e5-large
  dim: 1024
  # Обов'язкові префікси e5: без них якість пошуку помітно падає
  prefix_passage: "passage: "   # для чанків корпусу
  prefix_query: "query: "       # для claim при пошуку
  chunk_target_tokens: 500      # чанкінг за абзацами, ~500 токенів

retrieval:
  # КРИТИЧНО: новини живуть годинами — векторний пошук ЗАВЖДИ
  # фільтрується за published_at у вікні ±window_hours від дати поста
  window_hours: 48
  top_k: 8

worker:
  interval_minutes: 60   # пауза між циклами оновлення корпусу (режим демона)
  fetch_days: 2          # глибина дозбору; дедуп відсіює вже зібране
  rescore: true          # перераховувати рейтинги user-джерел після оновлення

llm:
  # Модель задається ТІЛЬКИ тут (провайдери видаляють моделі без попередження —
  # перед запуском звірте з актуальним списком: https://console.groq.com/docs/models)
  extractor:
    provider: groq
    model: llama-3.3-70b-versatile
    base_url: https://api.groq.com/openai/v1
    api_key_env: GROQ_API_KEY
    temperature: 0.0
    # Квоти Groq рахуються ПО МОДЕЛЯХ, тому інша модель = свіжий денний ліміт
    fallback:
      provider: groq
      model: openai/gpt-oss-120b
      base_url: https://api.groq.com/openai/v1
      api_key_env: GROQ_API_KEY
      temperature: 0.0
  judge:
    provider: groq
    model: llama-3.3-70b-versatile
    base_url: https://api.groq.com/openai/v1
    api_key_env: GROQ_API_KEY
    temperature: 0.0
    fallback:
      provider: groq
      model: openai/gpt-oss-120b
      base_url: https://api.groq.com/openai/v1
      api_key_env: GROQ_API_KEY
      temperature: 0.0
    # Приклад fallback на іншого провайдера:
    # fallback:
    #   provider: google_ai_studio
    #   model: <актуальна модель>
    #   base_url: https://generativelanguage.googleapis.com/v1beta/openai
    #   api_key_env: GEMINI_API_KEY

  # Другий суддя для порівняння бік-о-бік у test_channel.py --gold (опційно):
  # judge_alt:
  #   provider: google_ai_studio
  #   model: <актуальна модель>
  #   base_url: https://generativelanguage.googleapis.com/v1beta/openai
  #   api_key_env: GEMINI_API_KEY

  # Приклад anthropic (кешування системного промпту + Batch API вмикаються автоматично):
  # judge:
  #   provider: anthropic
  #   model: <актуальна модель з docs.anthropic.com>
  #   api_key_env: ANTHROPIC_API_KEY
  #   price_in_per_mtok: 0.0   # заповніть для логування вартості
  #   price_out_per_mtok: 0.0

